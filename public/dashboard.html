<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HexAuth | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[var(--bg)] text-[var(--text)] transition-colors duration-300 font-sans">
    <!-- Navbar -->
    <nav class="sticky top-0 z-10 border-b border-[var(--stroke)] bg-[var(--surface)] shadow-sm">
        <div class="mx-auto max-w-7xl px-5 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="flex h-8 w-8 items-center justify-center rounded-lg bg-[var(--accent)] text-sm font-bold text-[var(--accent-contrast)]">H</span>
                <span class="font-semibold tracking-wide text-[var(--text)]">HexAuth Dashboard</span>
            </div>
            <div class="flex items-center gap-4">
                <button id="theme-toggle" type="button" class="text-sm font-medium text-[var(--muted)] hover:text-[var(--text)] transition">Theme</button>
                <div class="h-4 w-px bg-[var(--stroke)]"></div>
                <div id="auth-badge" class="text-sm font-medium text-[var(--text)]">Session</div>
                <button id="logout-button" type="button" class="rounded-lg bg-[var(--surface-soft)] border border-[var(--stroke)] px-3 py-1.5 text-sm font-medium text-[var(--text)] transition hover:bg-[var(--surface)]">Logout</button>
            </div>
        </div>
    </nav>

    <main class="relative mx-auto max-w-7xl px-5 py-8 sm:px-6 lg:px-8">
        <div class="grid gap-8 lg:grid-cols-[1fr_2fr]">
            <!-- Sidebar / Form Area -->
            <div class="space-y-6">
                <!-- Stats / Quick Info -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="rounded-xl border border-[var(--stroke)] bg-[var(--surface)] p-4 shadow-sm">
                        <p class="text-xs font-medium uppercase tracking-wider text-[var(--muted)]">Apps</p>
                        <p id="project-count" class="mt-1 text-2xl font-semibold">0</p>
                    </div>
                    <div class="rounded-xl border border-[var(--stroke)] bg-[var(--surface)] p-4 shadow-sm flex flex-col justify-center">
                        <a href="/user/register" class="text-sm font-medium text-[var(--accent)] hover:underline flex items-center gap-1">
                            New owner account &rarr;
                        </a>
                    </div>
                </div>

                <!-- Project Form -->
                <div class="rounded-xl border border-[var(--stroke)] bg-[var(--surface)] p-5 shadow-sm sm:p-6">
                    <div class="mb-6 flex items-center justify-between border-b border-[var(--stroke)] pb-4">
                        <h2 class="text-lg font-semibold text-[var(--text)]">Project Studio</h2>
                        <span id="form-mode-label" class="rounded-md bg-[var(--surface-soft)] px-2.5 py-1 text-xs font-medium text-[var(--muted)]">Create mode</span>
                    </div>

                    <form id="project-form" class="space-y-4">
                        <input id="project-edit-client-id" type="hidden">
                        <div>
                            <label class="mb-1.5 block text-sm font-medium text-[var(--text)]" for="applicationName">Project name</label>
                            <input id="applicationName" name="applicationName" type="text" required class="w-full rounded-lg border border-[var(--stroke)] bg-[var(--surface-soft)] px-3.5 py-2.5 outline-none transition focus:border-[var(--accent)] focus:ring-1 focus:ring-[var(--accent)]" placeholder="Acme Dashboard">
                        </div>
                        <div>
                            <label class="mb-1.5 block text-sm font-medium text-[var(--text)]" for="contactEmail">Contact email</label>
                            <input id="contactEmail" name="contactEmail" type="email" required class="w-full rounded-lg border border-[var(--stroke)] bg-[var(--surface-soft)] px-3.5 py-2.5 outline-none transition focus:border-[var(--accent)] focus:ring-1 focus:ring-[var(--accent)]" placeholder="team@acme.com">
                        </div>
                        <div>
                            <label class="mb-1.5 block text-sm font-medium text-[var(--text)]" for="applicationUrl">Project URL</label>
                            <input id="applicationUrl" name="applicationUrl" type="url" required class="w-full rounded-lg border border-[var(--stroke)] bg-[var(--surface-soft)] px-3.5 py-2.5 outline-none transition focus:border-[var(--accent)] focus:ring-1 focus:ring-[var(--accent)]" placeholder="https://app.example.com">
                        </div>
                        <div>
                            <label class="mb-1.5 block text-sm font-medium text-[var(--text)]" for="redirectUrl">Redirect URL</label>
                            <input id="redirectUrl" name="redirectUrl" type="url" required class="w-full rounded-lg border border-[var(--stroke)] bg-[var(--surface-soft)] px-3.5 py-2.5 outline-none transition focus:border-[var(--accent)] focus:ring-1 focus:ring-[var(--accent)]" placeholder="https://app.example.com/auth/callback">
                        </div>
                        <div class="pt-2 flex flex-col gap-3 sm:flex-row">
                            <button id="project-submit" type="submit" class="flex-1 rounded-lg bg-[var(--accent)] px-4 py-2.5 text-sm font-semibold text-[var(--accent-contrast)] shadow-sm transition hover:opacity-90">Create project</button>
                            <button id="project-cancel" type="button" class="hidden rounded-lg border border-[var(--stroke)] bg-[var(--surface-soft)] px-4 py-2.5 text-sm font-semibold text-[var(--text)] transition hover:bg-[var(--surface)]">Cancel</button>
                        </div>
                    </form>

                    <div id="project-status" class="mt-4 hidden rounded-lg border border-transparent p-3 text-sm font-medium text-center"></div>
                </div>
            </div>

            <!-- Projects Area -->
            <div class="space-y-6">
                <div class="rounded-xl border border-[var(--stroke)] bg-[var(--surface)] p-5 shadow-sm sm:p-6 min-h-[500px]">
                    <div class="mb-6 flex items-center justify-between border-b border-[var(--stroke)] pb-4">
                        <h2 class="text-lg font-semibold text-[var(--text)]">Your Applications</h2>
                        <span class="text-sm text-[var(--muted)]">Manage credentials & links</span>
                    </div>

                    <div id="projects-empty" class="rounded-xl border border-dashed border-[var(--stroke)] bg-[var(--surface-soft)] p-8 text-center text-sm text-[var(--muted)]">
                        No projects yet. Create your first application on the left to get started.
                    </div>
                    
                    <div id="projects-list" class="hidden space-y-6"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const tokenKey = "hexauth-access-token";
        const userKey = "hexauth-user";
        const themeStorageKey = "hexauth-theme";
        const themes = {
            light: {
                "--bg": "#f9fafb",
                "--text": "#111827",
                "--muted": "#6b7280",
                "--stroke": "#e5e7eb",
                "--surface": "#ffffff",
                "--surface-soft": "#f3f4f6",
                "--accent": "#0f172a",
                "--accent-contrast": "#ffffff"
            },
            dark: {
                "--bg": "#111827",
                "--text": "#f9fafb",
                "--muted": "#9ca3af",
                "--stroke": "#374151",
                "--surface": "#1f2937",
                "--surface-soft": "#111827",
                "--accent": "#38bdf8",
                "--accent-contrast": "#0f172a"
            }
        };

        const themeToggle = document.getElementById("theme-toggle");
        const logoutButton = document.getElementById("logout-button");
        const projectForm = document.getElementById("project-form");
        const projectStatus = document.getElementById("project-status");
        const projectsList = document.getElementById("projects-list");
        const projectsEmpty = document.getElementById("projects-empty");
        const projectCount = document.getElementById("project-count");
        const authBadge = document.getElementById("auth-badge");
        const projectSubmit = document.getElementById("project-submit");
        const projectCancel = document.getElementById("project-cancel");
        const projectEditClientId = document.getElementById("project-edit-client-id");
        const formModeLabel = document.getElementById("form-mode-label");

        const getTheme = () => localStorage.getItem(themeStorageKey) || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        const setTheme = (theme) => {
            Object.entries(themes[theme]).forEach(([key, value]) => document.documentElement.style.setProperty(key, value));
            document.documentElement.dataset.theme = theme;
            localStorage.setItem(themeStorageKey, theme);
            themeToggle.textContent = theme === "dark" ? "Light Mode" : "Dark Mode";
        };

        const getToken = () => localStorage.getItem(tokenKey);
        const getUser = () => {
            const value = localStorage.getItem(userKey);
            return value ? JSON.parse(value) : null;
        };

        const clearSession = () => {
            localStorage.removeItem(tokenKey);
            localStorage.removeItem(userKey);
        };

        const setStatus = (element, message, type) => {
            element.textContent = message;
            element.className = "mt-4 rounded-lg border p-3 text-center text-sm font-medium";
            element.classList.remove("hidden");
            element.style.borderColor = type === "error" ? "#fca5a5" : "var(--stroke)";
            element.style.background = type === "error" ? "#fef2f2" : "var(--surface-soft)";
            element.style.color = type === "error" ? "#991b1b" : "var(--text)";
            
            // Auto hide success messages
            if (type !== "error") {
                setTimeout(() => {
                    element.classList.add("hidden");
                }, 3000);
            }
        };

        const authHeaders = () => ({
            "Content-Type": "application/json",
            "Authorization": `Bearer ${getToken()}`
        });

        const copyToClipboard = async (value, successMessage) => {
            await navigator.clipboard.writeText(value);
            setStatus(projectStatus, successMessage, "info");
        };

        const downloadCredentials = (project) => {
            const signinUrl = `${window.location.origin}/user/login?client_id=${encodeURIComponent(project.clientId)}&redirect_uri=${encodeURIComponent(project.redirectUrl)}`;
            const signupUrl = `${window.location.origin}/user/register?client_id=${encodeURIComponent(project.clientId)}&redirect_uri=${encodeURIComponent(project.redirectUrl)}`;
            const content = [
                `HexAuth Project: ${project.applicationName}`,
                `Client ID: ${project.clientId}`,
                `Client Secret: ${project.clientSecret}`,
                `Application URL: ${project.applicationUrl}`,
                `Redirect URL: ${project.redirectUrl}`,
                `Signin URL: ${signinUrl}`,
                `Signup URL: ${signupUrl}`
            ].join("\n");
            const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `${project.applicationName.toLowerCase().replace(/[^a-z0-9]+/g, "-") || "hexauth-project"}-credentials.txt`;
            link.click();
            URL.revokeObjectURL(url);
        };

        const resetForm = () => {
            projectForm.reset();
            projectEditClientId.value = "";
            projectSubmit.textContent = "Create project";
            formModeLabel.textContent = "Create mode";
            projectCancel.classList.add("hidden");
            projectStatus.classList.add("hidden");
        };

        const beginEdit = (project) => {
            projectEditClientId.value = project.clientId;
            projectForm.applicationName.value = project.applicationName;
            projectForm.contactEmail.value = project.contactEmail;
            projectForm.applicationUrl.value = project.applicationUrl;
            projectForm.redirectUrl.value = project.redirectUrl;
            projectSubmit.textContent = "Update project";
            formModeLabel.textContent = `Editing`;
            projectCancel.classList.remove("hidden");
            window.scrollTo({ top: 0, behavior: "smooth" });
        };

        projectCancel.addEventListener("click", resetForm);

        const renderProjects = (projects) => {
            projectCount.textContent = projects.length;
            projectsEmpty.classList.toggle("hidden", projects.length > 0);
            projectsList.classList.toggle("hidden", projects.length === 0);

            const byId = new Map(projects.map((project) => [project.clientId, project]));

            projectsList.innerHTML = projects.map((project) => {
                const signinUrl = `${window.location.origin}/user/login?client_id=${encodeURIComponent(project.clientId)}&redirect_uri=${encodeURIComponent(project.redirectUrl)}`;
                const signupUrl = `${window.location.origin}/user/register?client_id=${encodeURIComponent(project.clientId)}&redirect_uri=${encodeURIComponent(project.redirectUrl)}`;

                return `
                    <article class="rounded-xl border border-[var(--stroke)] bg-[var(--surface-soft)] p-5">
                        <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between border-b border-[var(--stroke)] pb-4 mb-4">
                            <div>
                                <h3 class="text-xl font-semibold text-[var(--text)]">${project.applicationName}</h3>
                                <p class="text-sm text-[var(--muted)] mt-1">${project.contactEmail}</p>
                            </div>
                            <div class="flex flex-wrap gap-2">
                                <button data-edit="${project.clientId}" class="rounded-lg border border-[var(--stroke)] bg-[var(--surface)] px-3 py-1.5 text-sm font-medium hover:bg-[var(--surface-soft)] transition">Edit</button>
                                <button data-download="${project.clientId}" class="rounded-lg bg-[var(--accent)] px-3 py-1.5 text-sm font-medium text-[var(--accent-contrast)] hover:opacity-90 transition">Download</button>
                                <button data-delete="${project.clientId}" class="rounded-lg border border-red-200 bg-red-50 text-red-600 px-3 py-1.5 text-sm font-medium hover:bg-red-100 transition">Delete</button>
                            </div>
                        </div>

                        <div class="grid gap-4 sm:grid-cols-2">
                            <div class="space-y-1">
                                <p class="text-xs font-semibold uppercase tracking-wider text-[var(--muted)]">Client ID</p>
                                <div class="flex items-center justify-between rounded-lg border border-[var(--stroke)] bg-[var(--surface)] p-2">
                                    <p class="truncate text-sm font-mono text-[var(--text)] mr-2">${project.clientId}</p>
                                    <button data-copy="clientId" data-project="${project.clientId}" class="text-[var(--accent)] hover:text-opacity-80 p-1" title="Copy"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                                </div>
                            </div>
                            <div class="space-y-1">
                                <p class="text-xs font-semibold uppercase tracking-wider text-[var(--muted)]">Client Secret</p>
                                <div class="flex items-center justify-between rounded-lg border border-[var(--stroke)] bg-[var(--surface)] p-2">
                                    <p class="truncate text-sm font-mono text-[var(--text)] mr-2">****************</p>
                                    <button data-copy="clientSecret" data-project="${project.clientId}" class="text-[var(--accent)] hover:text-opacity-80 p-1" title="Copy"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                                </div>
                            </div>
                            <div class="space-y-1">
                                <p class="text-xs font-semibold uppercase tracking-wider text-[var(--muted)]">App URL</p>
                                <p class="text-sm text-[var(--text)] truncate" title="${project.applicationUrl}">${project.applicationUrl}</p>
                            </div>
                            <div class="space-y-1">
                                <p class="text-xs font-semibold uppercase tracking-wider text-[var(--muted)]">Redirect URL</p>
                                <p class="text-sm text-[var(--text)] truncate" title="${project.redirectUrl}">${project.redirectUrl}</p>
                            </div>
                            <div class="space-y-1 sm:col-span-2 mt-2">
                                <p class="text-xs font-semibold uppercase tracking-wider text-[var(--muted)]">Login Link (SSO)</p>
                                <div class="flex items-center justify-between rounded-lg border border-[var(--stroke)] bg-[var(--surface)] p-2">
                                    <p class="truncate text-sm text-[var(--muted)] mr-2">${signinUrl}</p>
                                    <button data-copy="signinUrl" data-project="${project.clientId}" class="text-xs font-medium text-[var(--accent)] whitespace-nowrap hover:underline">Copy Link</button>
                                </div>
                            </div>
                        </div>
                    </article>
                `;
            }).join("");

            projectsList.querySelectorAll("[data-edit]").forEach((button) => {
                button.addEventListener("click", () => beginEdit(byId.get(button.dataset.edit)));
            });

            projectsList.querySelectorAll("[data-download]").forEach((button) => {
                button.addEventListener("click", () => downloadCredentials(byId.get(button.dataset.download)));
            });

            projectsList.querySelectorAll("[data-copy]").forEach((button) => {
                button.addEventListener("click", async () => {
                    try {
                        const project = byId.get(button.dataset.project);

                        if (!project) {
                            return;
                        }

                        const lookup = {
                            clientId: project.clientId,
                            clientSecret: project.clientSecret,
                            signinUrl: `${window.location.origin}/user/login?client_id=${encodeURIComponent(project.clientId)}&redirect_uri=${encodeURIComponent(project.redirectUrl)}`,
                            signupUrl: `${window.location.origin}/user/register?client_id=${encodeURIComponent(project.clientId)}&redirect_uri=${encodeURIComponent(project.redirectUrl)}`
                        };

                        const messages = {
                            clientId: "Client ID copied to clipboard",
                            clientSecret: "Client secret copied to clipboard",
                            signinUrl: "Login URL copied to clipboard",
                            signupUrl: "Register URL copied to clipboard"
                        };

                        await copyToClipboard(lookup[button.dataset.copy], messages[button.dataset.copy]);
                    } catch (error) {
                        setStatus(projectStatus, error.message || "Copy failed", "error");
                    }
                });
            });

            projectsList.querySelectorAll("[data-delete]").forEach((button) => {
                button.addEventListener("click", async () => {
                    if (!confirm("Are you sure you want to delete this project? This cannot be undone.")) return;
                    try {
                        const response = await fetch(`/client/${encodeURIComponent(button.dataset.delete)}`, {
                            method: "DELETE",
                            headers: authHeaders()
                        });
                        const result = await response.json();

                        if (!response.ok || !result.success) {
                            throw new Error(result.message || "Delete failed");
                        }

                        setStatus(projectStatus, "Project deleted.", "info");
                        await loadProjects();
                    } catch (error) {
                        setStatus(projectStatus, error.message || "Delete failed", "error");
                    }
                });
            });
        };

        const loadProjects = async () => {
            const token = getToken();
            const user = getUser();

            if (!token || !user) {
                window.location.href = `/user/login?next=${encodeURIComponent("/dashboard")}`;
                return;
            }

            authBadge.textContent = user.name || user.email || "User";

            try {
                const response = await fetch("/clients", {
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });
                const result = await response.json();

                if (!response.ok || !result.success) {
                    throw new Error(result.message || "Unable to load projects");
                }

                renderProjects(result.data);
            } catch (error) {
                clearSession();
                window.location.href = `/user/login?next=${encodeURIComponent("/dashboard")}`;
            }
        };

        projectForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            const editingClientId = projectEditClientId.value;
            const payload = {
                applicationName: projectForm.applicationName.value,
                contactEmail: projectForm.contactEmail.value,
                applicationUrl: projectForm.applicationUrl.value,
                redirectUrl: projectForm.redirectUrl.value
            };

            try {
                setStatus(projectStatus, editingClientId ? "Updating..." : "Creating...", "info");
                const response = await fetch(editingClientId ? `/client/${encodeURIComponent(editingClientId)}` : "/client/register", {
                    method: editingClientId ? "PUT" : "POST",
                    headers: authHeaders(),
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (!response.ok || !result.success) {
                    throw new Error(result.message || "Save failed");
                }

                resetForm();
                setStatus(projectStatus, editingClientId ? "Project updated successfully." : "Project created successfully.", "info");
                await loadProjects();

                if (!editingClientId) {
                    downloadCredentials(result.data);
                }
            } catch (error) {
                setStatus(projectStatus, error.message || "Save failed", "error");
            }
        });

        logoutButton.addEventListener("click", () => {
            clearSession();
            window.location.href = `/user/login?next=${encodeURIComponent("/dashboard")}`;
        });

        setTheme(getTheme());
        themeToggle.addEventListener("click", () => setTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark"));
        loadProjects();
    </script>
</body>
</html>
